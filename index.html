<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
        .my-box {
            border: 2px solid grey;
            border-radius: 5px;
            padding: 20px;
            width: 320px;
        }
    </style>
  <style>
  .img-border {
    border: 1px solid grey; /* Красная рамка толщиной 3px */
    border-radius: 5px;        /* Скругленные углы (опционально) */
    padding: 5px;
    width: 290px;
    height: 245px              /* Отступ между картинкой и рамкой (опционально) */
  }
</style>

</head>
<body>
  <h1 style="margin-left: 40px;">Выбери свой продукт</h1>

  <ul class="my-box">
    <img class="img-border" style="margin-left: 10px;"src="images/photo_1.png" width="300" height="200" alt="Товар Увлажняющий мусс">
    <p>
      <span> для нормальной кожи</span>
    </p>
    <h2>Увлажняющий мусс</h2>
    <p>Глубоко увлажняют кожу лица, оставляя её мягкой и гладкой.</p>
    <span>Состав:</span>
        <ul>
          <li>активные натуральные комплексы</li>
          <li>витамины С, А, РР, В И Е</li>
          <li>солнцезащитные компоненты</li>
        </ul>
        <p></p>
        <b>Цена</b>
        <span style="margin-left: 200px;"> 2 750 ₽ </span>
        
  </ul>
</body>
</html>
